name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - dev
      - dev-stable

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install build ruff

      - name: Syntax lint
        run: python -m ruff check --select E9 src tests

      - name: Import and CLI smoke test
        run: |
          python -m buildusd --help
          python -m ifc_converter --help

      - name: Tests
        run: python -m pytest --basetemp .pytest_tmp

      - name: Build distribution
        run: python -m build

  check:
    name: check
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Require all matrix jobs to pass
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "CI matrix result: ${{ needs.test.result }}"
            exit 1
          fi
