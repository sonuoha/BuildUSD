[pytest]
testpaths =
    tests
markers =
    slow: Slow integration/golden snapshot conversions (run in CI)
addopts = -m "not slow"
norecursedirs =
    .git
    .mypy_cache
    .pytest_cache
    .ruff_cache
    .venv
    .venv_*
    _worktree_*
    build
    data
    dist
    local_output
    out_test
    patch
    todo
